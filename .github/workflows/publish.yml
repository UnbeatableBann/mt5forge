name: Build and Publish MT5Forge

on:
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:

  test:
    name: Test Suite
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install UV
        uses: astral-sh/setup-uv@v5

      - name: Install Dependencies
        run: |
          uv sync --all-extras --dev

      - name: Ruff
        run: |
          uv run ruff check .

      - name: MyPy
        run: |
          uv run mypy mt5forge --ignore-missing-imports

      - name: Pytest
        run: |
          uv run pytest tests -v --cov=mt5forge --cov-report=xml

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install UV
        uses: astral-sh/setup-uv@v5

      - name: Build Distribution
        run: |
          uv build

      - name: Install Twine
        run: |
          python -m pip install --upgrade twine

      - name: Verify Package
        run: |
          twine check dist/*

      - name: Upload Distribution
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish TestPyPI
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'refs/heads/dev'

    environment:
      name: testpypi
      url: https://test.pypi.org/project/mt5forge/

    steps:
      - name: Download Distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

  publish-pypi:
    name: Publish PyPI
    runs-on: ubuntu-latest
    needs: build

    if: github.ref == 'refs/heads/main'

    environment:
      name: pypi
      url: https://pypi.org/project/mt5forge/

    steps:
      - name: Download Distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}